<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KM Registratie</title>

<style>
body { font-family: sans-serif; background:#0b0b0b; color:#fff; }
input, button { padding:10px; margin:5px 0; width:100%; }
</style>
</head>
<body>

<h2>KM Registratie</h2>

<input id="van" placeholder="Van">
<input id="naar" placeholder="Naar">
<input id="km" type="number" placeholder="KM">
<button onclick="save()">Opslaan</button>

<ul id="list"></ul>

<script>
// ─── CONFIG ─────────────────────────────────────────

// Google
const DEFAULT_API_KEY = 'AIzaSyAzDya29edoWWONaAXUZ4k5F3iPxyplGMY';

// Supabase
const SUPABASE_URL = 'https://aaivsqikzmkjrgfylvlp.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_Iz-YdOCytLqe3Fl092tZjA_P1NarPtm';

// Init Supabase
const supabaseClient = window.supabase
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY)
  : null;


async function save() {
  const van = document.getElementById('van').value;
  const naar = document.getElementById('naar').value;
  const km = parseFloat(document.getElementById('km').value);

  if (!van || !naar || !km) return alert('Vul alles in');

  const entry = {
    van,
    naar,
    km,
    cat: 'werk',
    datum: new Date().toISOString().split('T')[0]
  };

  if (supabaseClient) {
    await supabaseClient.from('ritten').insert([entry]);
  } else {
    const data = JSON.parse(localStorage.getItem('ritten') || '[]');
    data.push(entry);
    localStorage.setItem('ritten', JSON.stringify(data));
  }

  load();
}

async function load() {
  let data = [];

  if (supabaseClient) {
    const res = await supabaseClient.from('ritten').select('*');
    data = res.data || [];
  } else {
    data = JSON.parse(localStorage.getItem('ritten') || '[]');
  }

  const list = document.getElementById('list');
  list.innerHTML = data.map(d => `<li>${d.van} → ${d.naar} (${d.km}km)</li>`).join('');
}

load();
</script>

</body>
</html>
